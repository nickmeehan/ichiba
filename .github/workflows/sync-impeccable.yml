name: Sync Impeccable Skills

on:
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ichiba
        uses: actions/checkout@v4

      - name: Run sync script (check only)
        id: check
        run: |
          if bin/sync-impeccable.sh --check 2>&1; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Sync skills
        if: steps.check.outputs.up_to_date == 'false'
        run: bin/sync-impeccable.sh

      - name: Create pull request
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(impeccable): sync skills from upstream"
          title: "chore(impeccable): sync skills from upstream"
          body: |
            Automated sync of skills from [pbakaus/impeccable](https://github.com/pbakaus/impeccable).

            Run `bin/sync-impeccable.sh --check` locally to see what changed.
          branch: auto/sync-impeccable
          delete-branch: true
          labels: automated
