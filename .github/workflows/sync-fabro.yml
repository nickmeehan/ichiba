name: Sync fabro plugin

on:
  schedule:
    - cron: '23 6 * * *'
  workflow_dispatch:

# Share the release concurrency group so a sync never races a
# semantic-release run — both push version bumps to main.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - name: Sync from nickmeehan/dark-factory
        id: sync
        run: bash bin/sync-vendored-plugin.sh fabro nickmeehan/dark-factory

      - name: Install Claude Code
        if: steps.sync.outputs.synced == 'true'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate
        if: steps.sync.outputs.synced == 'true'
        run: |
          claude plugin validate .
          claude plugin validate plugins/fabro

      - name: Commit, tag, and push
        if: steps.sync.outputs.synced == 'true'
        env:
          VERSION: ${{ steps.sync.outputs.version }}
          UPSTREAM_TAG: ${{ steps.sync.outputs.upstream_tag }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: |
          git config user.name ichiba-release-bot
          git config user.email ichiba-release-bot@users.noreply.github.com
          git add plugins/fabro .claude-plugin/marketplace.json
          git commit \
            -m "chore(release): fabro ${VERSION} [skip ci]" \
            -m "Synced from nickmeehan/dark-factory ${UPSTREAM_TAG} (${UPSTREAM_SHA})."
          git tag "fabro-v${VERSION}"
          git push origin HEAD:main "refs/tags/fabro-v${VERSION}"

      - name: Create GitHub release
        if: steps.sync.outputs.synced == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ steps.sync.outputs.version }}
          UPSTREAM_TAG: ${{ steps.sync.outputs.upstream_tag }}
        run: |
          gh release create "fabro-v${VERSION}" \
            --title "fabro-v${VERSION}" \
            --notes "Vendored from [nickmeehan/dark-factory ${UPSTREAM_TAG}](https://github.com/nickmeehan/dark-factory/releases/tag/${UPSTREAM_TAG})."
