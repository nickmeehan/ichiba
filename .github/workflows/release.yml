name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          plugins=$(bash bin/list-releasable-plugins.sh | jq -R . | jq -s -c .)
          echo "plugins=$plugins" >> "$GITHUB_OUTPUT"

  release:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    strategy:
      max-parallel: 1
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Release ${{ matrix.plugin }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PLUGIN: ${{ matrix.plugin }}
          GIT_AUTHOR_NAME: ichiba-release-bot
          GIT_AUTHOR_EMAIL: ichiba-release-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: ichiba-release-bot
          GIT_COMMITTER_EMAIL: ichiba-release-bot@users.noreply.github.com
        run: pnpm exec semantic-release

  # Vendored plugins never enter the semantic-release matrix; their version
  # is adopted from upstream by the sync workflow's chore(vendor) commit.
  # This job cuts the release for any vendored entry whose version has no
  # <plugin>-v<version> tag yet: marketplace bump, chore(release) commit,
  # tag, GitHub Release. Detection is state-based, so a failed run retries
  # on the next push to main. Runs after the semantic-release matrix so
  # pushes to main stay serialized, but with !cancelled() so a native
  # release failure never blocks a vendored release (or vice versa).
  finalize-vendored:
    needs: release
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Finalize pending vendored releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name ichiba-release-bot
          git config user.email ichiba-release-bot@users.noreply.github.com
          bash bin/finalize-vendored-releases.sh
